# Chain run settings for scripts/gpr_chain.py
# Usage: pixi run wheels

# Path to the chain input template.
template = "wheels/models/wheels-chain.in"

# Enable GPU mode for the chain run.
gpu = true

# Compact sweep mode (same geometry + same ascans + many materials).
geometry_file = "../geometries/wheels_watertable_geometry.h5"
ascans = 197

material_dir = "../materials"
material_files = ["split_sand_material_013.txt","split_sand_material_015.txt"]



